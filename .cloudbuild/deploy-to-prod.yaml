steps:

substitutions:
  _PROD_PROJECT_ID: YOUR_PROD_PROJECT_ID
  _REGION: us-east1

logsBucket: gs://${PROJECT_ID}-social-services-copilot-logs/build-logs
options:
  env:
    - 'UV_PYTHON=3.12'
    - 'CI=true'
  substitutionOption: ALLOW_LOOSE
  defaultLogsBucketBehavior: REGIONAL_USER_OWNED_BUCKET
