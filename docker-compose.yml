services:
  backend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm start"
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      FRONTEND_ORIGIN: "http://localhost:5173"
      LLM_PROVIDER: "mock"
      ALLOW_RULES_ONLY: "true"
    volumes:
      - ./backend:/app

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_ORIGIN: "http://localhost:3001"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

  mcp-server:
    image: node:20-alpine
    working_dir: /repo/mcp-server
    command: sh -c "npm ci && npm test"
    volumes:
      - .:/repo
    depends_on:
      - backend
